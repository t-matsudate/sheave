name: Testing
on:
  push:
    branches:
    - v0.x
jobs:
  testing:
    name: Testing Source Codes
    runs-on: ubuntu-latest
    steps:
    - name: Installing Rust 1.41 Image
      id: installing-latest-image
      uses: docker://rust:latest
    - name: Running Tests
      id: running-tests
      run: cargo test
